services:
  rigol-dho-mcp:
    build: .
    container_name: rigol-dho-mcp
    restart: unless-stopped
    
    # HTTP transport (recommended for containers) - exposes MCP endpoint at http://localhost:${MCP_PORT:-8000}/mcp
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    env_file:
      - .env
    environment:
      # Uncomment/override any of these to take precedence over .env
      # RIGOL_HOST: 192.168.1.100
      # MCP_ALLOWED_ORIGINS: http://localhost:6274,http://127.0.0.1:6274
      # MCP_ALLOWED_HOSTS: 192.168.2.10:8698,local-services.local:8698
    # Environment variables are loaded from .env file if it exists,
    # otherwise fall back to the defaults specified here.
      RIGOL_HOST: ${RIGOL_HOST:-192.168.1.100}
      RIGOL_PORT: ${RIGOL_PORT:-5555}
      RIGOL_TIMEOUT: ${RIGOL_TIMEOUT:-10}
      
      # MCP server configuration
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      
      # Optional: Enable raw SCPI escape hatch (set to "1" to enable)
      RIGOL_ENABLE_SCPI_RAW: ${RIGOL_ENABLE_SCPI_RAW:-0}

    # Uncomment the following line if your scope is on a different network segment 
    # and the default bridge network doesn't reach it:
    # network_mode: "host"

  # Alternative configuration for stdio transport (for local MCP clients)
  # To use this, comment out the above service and uncomment below:
  # rigol-dho-mcp-stdio:
  #   build: .
  #   container_name: rigol-dho-mcp-stdio
  #   restart: unless-stopped
  #   environment:
  #     RIGOL_HOST: ${RIGOL_HOST:-192.168.1.100}
  #     RIGOL_PORT: ${RIGOL_PORT:-5555}
  #     MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
